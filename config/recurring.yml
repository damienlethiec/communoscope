production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Données annuelles DGFiP : relance mensuelle idempotente pour récupérer
  # les millésimes et corrections publiés en cours d'année.
  finances_import:
    class: Finances::ImportJob
    queue: default
    schedule: "0 5 3 * *"
